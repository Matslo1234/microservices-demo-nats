apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefrontprojectionservice
  labels:
    app: storefrontprojectionservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storefrontprojectionservice
  template:
    metadata:
      labels:
        app: storefrontprojectionservice
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: storefrontprojectionservice
      terminationGracePeriodSeconds: 35
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        image: matslo123/storefrontprojectionservice:phase6-20260719-1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: NATS_REQUIRED
          value: "true"
        - name: NATS_REQUIRED_SUBSCRIPTIONS
          value: "storefront-projection-v1,boutique.qry.storefront.home.v1,boutique.qry.storefront.product.v1,boutique.qry.storefront.cart.v1,boutique.qry.storefront.currencies.v1,boutique.qry.storefront.product-meta.v1,boutique.qry.storefront.operation.v1,boutique.qry.storefront.order.v1"
        envFrom:
        - configMapRef:
            name: nats-client-config
        - secretRef:
            name: nats-credentials-storefrontprojectionservice
        volumeMounts:
        - name: nats-ca
          mountPath: /etc/nats-ca
          readOnly: true
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 300m
            memory: 256Mi
      volumes:
      - name: nats-ca
        configMap:
          name: nats-ca
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: storefrontprojectionservice
