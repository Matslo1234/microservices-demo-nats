apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: frontend
      terminationGracePeriodSeconds: 35
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: wait-for-storefront-projection
        image: natsio/nats-box:0.19.7-nonroot
        command:
        - sh
        - -ec
        - |
          for attempt in $(seq 1 60); do
            response="$(nats --server="${NATS_URL}" --user="${NATS_USER}" --password="${NATS_PASSWORD}" --tlsca=/etc/nats-ca/ca.crt --timeout=2s request boutique.qry.storefront.home.v1 '{"currency_code":"USD"}' 2>/dev/null || true)"
            case "${response}" in
              *'"products"'*)
                echo "storefront projection contains the initial catalog and currency snapshots"
                exit 0
                ;;
            esac
            echo "waiting for initial storefront projection (${attempt}/60)"
            sleep 2
          done
          echo "storefront projection did not initialize within two minutes" >&2
          exit 1
        envFrom:
        - configMapRef:
            name: nats-client-config
        - secretRef:
            name: nats-credentials-frontend
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: nats-ca
          mountPath: /etc/nats-ca
          readOnly: true
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          image: matslo123/frontend:phase6-20260719-1
          ports:
          - containerPort: 8080
          readinessProbe:
            initialDelaySeconds: 10
            timeoutSeconds: 3
            httpGet:
              path: "/_readyz"
              port: 8080
              httpHeaders:
              - name: "Cookie"
                value: "shop_session-id=x-readiness-probe"
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: "/_healthz"
              port: 8080
              httpHeaders:
              - name: "Cookie"
                value: "shop_session-id=x-liveness-probe"
          env:
          - name: PORT
            value: "8080"
          - name: NATS_REQUIRED
            value: "true"
          - name: NATS_REQUIRED_SUBSCRIPTIONS
            value: "boutique.qry.storefront.home.v1,boutique.qry.storefront.product.v1,boutique.qry.storefront.cart.v1,boutique.qry.storefront.currencies.v1,boutique.qry.storefront.product-meta.v1,boutique.qry.storefront.operation.v1,boutique.qry.storefront.order.v1,boutique.qry.payment.tokenize.v1"
          - name: CART_OPERATION_WAIT_TIMEOUT
            value: "750ms"
          # # ENV_PLATFORM: One of: local, gcp, aws, azure, onprem, alibaba
          # # When not set, defaults to "local" unless running in GKE, otherwies auto-sets to gcp
          # - name: ENV_PLATFORM
          #   value: "aws"
          - name: ENABLE_PROFILER
            value: "0"
          # - name: CYMBAL_BRANDING
          #   value: "true"
          # - name: ENABLE_ASSISTANT
          #   value: "true"
          # - name: FRONTEND_MESSAGE
          #   value: "Replace this with a message you want to display on all pages."
          envFrom:
          - configMapRef:
              name: nats-client-config
          - secretRef:
              name: nats-credentials-frontend
          volumeMounts:
          - name: nats-ca
            mountPath: /etc/nats-ca
            readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
      - name: nats-ca
        configMap:
          name: nats-ca
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-external
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
  - name: http
    port: 80
    targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
