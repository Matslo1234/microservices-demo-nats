syntax = "proto3";

package boutique.common.v1;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/GoogleCloudPlatform/microservices-demo/protos/common/v1;commonv1";
option java_multiple_files = true;
option java_package = "boutique.common.v1";
option csharp_namespace = "Boutique.Common.V1";

// MessageEnvelope is required around every command and durable domain event.
// Subject versions identify the payload contract; schema_version identifies
// this envelope contract and is 1 for the initial release.
message MessageEnvelope {
  string message_id = 1;
  string message_type = 2;
  uint32 schema_version = 3;
  google.protobuf.Timestamp occurred_at = 4;
  string producer = 5;
  string aggregate_type = 6;
  string aggregate_id = 7;
  uint64 aggregate_version = 8;
  string correlation_id = 9;
  string causation_id = 10;
  string traceparent = 11;
  string tracestate = 12;
  google.protobuf.Any data = 13;
}

// Failure contains only information safe to publish on integration subjects.
// Provider responses, stack traces, card data, and credentials are forbidden.
message Failure {
  string code = 1;
  bool retryable = 2;
  string safe_message = 3;
}

message Money {
  string currency_code = 1;
  int64 units = 2;
  int32 nanos = 3;
}

message PostalAddress {
  string street_address = 1;
  string city = 2;
  string state = 3;
  string country = 4;
  int32 zip_code = 5;
}

message CartLine {
  string product_id = 1;
  int32 quantity = 2;
}

message CartSnapshot {
  string user_id = 1;
  repeated CartLine items = 2;
  uint64 cart_version = 3;
}

message ProductSnapshot {
  string product_id = 1;
  string name = 2;
  string description = 3;
  string picture = 4;
  Money price_usd = 5;
  repeated string categories = 6;
  uint64 product_version = 7;
}

message OrderLine {
  CartLine item = 1;
  Money unit_cost = 2;
}

message SanitizedOrderSnapshot {
  string order_id = 1;
  string user_id = 2;
  string email = 3;
  PostalAddress shipping_address = 4;
  repeated OrderLine items = 5;
  Money shipping_cost = 6;
  Money total = 7;
  string tracking_id = 8;
}

message AdSelection {
  string redirect_url = 1;
  string text = 2;
}
