# Phase 6 makes the NATS-only application boundary mandatory. Domain pods
# accept only pod-local health/metrics HTTP traffic and can reach only DNS,
# NATS, and the optional in-namespace telemetry collector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: application-health-and-nats
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - adservice
      - cartservice
      - checkoutservice
      - currencyservice
      - emailservice
      - frontend
      - paymentservice
      - productcatalogservice
      - recommendationservice
      - shippingservice
      - storefrontprojectionservice
  policyTypes: ["Ingress", "Egress"]
  ingress:
  # Kubelet probes and Prometheus may originate outside the workload namespace.
  # Port 8080 exposes only HTTP health/metrics on domain workers; frontend is
  # intentionally the sole business HTTP boundary on the same port.
  - ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: nats
      podSelector:
        matchLabels:
          app.kubernetes.io/name: nats
    ports:
    - protocol: TCP
      port: 4222
  - to:
    - podSelector:
        matchLabels:
          app: opentelemetrycollector
    ports:
    - protocol: TCP
      port: 4317
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: telemetry-collector
spec:
  podSelector:
    matchLabels:
      app: opentelemetrycollector
  policyTypes: ["Ingress", "Egress"]
  ingress:
  - from:
    - podSelector:
        matchExpressions:
        - key: app
          operator: Exists
    ports:
    - protocol: TCP
      port: 4317
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cart-to-redis
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes: ["Egress"]
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis-cart
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-from-cart
spec:
  podSelector:
    matchLabels:
      app: redis-cart
  policyTypes: ["Ingress", "Egress"]
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: cartservice
    ports:
    - protocol: TCP
      port: 6379
  egress: []
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: loadgenerator-to-frontend
spec:
  podSelector:
    matchLabels:
      app: loadgenerator
  policyTypes: ["Egress"]
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - protocol: TCP
      port: 8080
