apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  labels:
    app: paymentservice
spec:
  # Provider outcomes are persisted by a single writer.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: paymentservice
      terminationGracePeriodSeconds: 35
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: volume-permissions
        image: busybox:1.37.0
        command: ["sh", "-ec", "chown 1000:1000 /data"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN"]
          readOnlyRootFilesystem: true
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - name: payment-data
          mountPath: /data
        resources:
          requests:
            cpu: 5m
            memory: 8Mi
          limits:
            cpu: 50m
            memory: 32Mi
      containers:
      - name: server
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: paymentservice
        ports:
        - name: health
          containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DISABLE_PROFILER
          value: "1"
        - name: NATS_REQUIRED
          value: "true"
        - name: NATS_REQUIRED_SUBSCRIPTIONS
          value: "boutique.qry.payment.tokenize.v1,payment-commands-v1"
        - name: PAYMENT_STORE_PATH
          value: /var/lib/payment/provider-state.json
        envFrom:
        - configMapRef:
            name: nats-client-config
        - secretRef:
            name: nats-credentials-paymentservice
        volumeMounts:
        - name: nats-ca
          mountPath: /etc/nats-ca
          readOnly: true
        - name: payment-data
          mountPath: /var/lib/payment
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: nats-ca
        configMap:
          name: nats-ca
      - name: payment-data
        persistentVolumeClaim:
          claimName: payment-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paymentservice
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payment-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
