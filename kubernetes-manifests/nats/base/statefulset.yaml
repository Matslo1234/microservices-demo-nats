apiVersion: v1
kind: ServiceAccount
metadata:
  name: nats
  namespace: nats
---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: nats
  ports:
  - name: client
    port: 4222
    targetPort: client
  - name: cluster
    port: 6222
    targetPort: cluster
  - name: monitor
    port: 8222
    targetPort: monitor
  - name: metrics
    port: 7777
    targetPort: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
spec:
  selector:
    app.kubernetes.io/name: nats
  ports:
  - name: client
    port: 4222
    targetPort: client
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nats
  namespace: nats
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/part-of: online-boutique
spec:
  serviceName: nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/part-of: online-boutique
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: nats
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: nats
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: nats
      initContainers:
      - name: volume-permissions
        image: busybox:1.37.0
        # Existing JetStream files are already owned by the server user. Only
        # the volume root needs ownership fixed when a new claim is first used.
        command: ["sh", "-ec", "chown 1000:1000 /data"]
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["CHOWN"]
        volumeMounts:
        - name: jetstream
          mountPath: /data
      containers:
      - name: nats
        image: nats:2.14.3-alpine
        imagePullPolicy: IfNotPresent
        args: ["-c", "/etc/nats-config/nats.conf"]
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        envFrom:
        - secretRef:
            name: nats-server-auth
        ports:
        - name: client
          containerPort: 4222
        - name: cluster
          containerPort: 6222
        - name: monitor
          containerPort: 8222
        startupProbe:
          httpGet:
            path: /healthz?js-enabled-only=true
            port: monitor
          failureThreshold: 60
          periodSeconds: 2
        readinessProbe:
          httpGet:
            path: /healthz?js-enabled-only=true
            port: monitor
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz?js-server-only=true
            port: monitor
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["nats-server", "-sl", "ldm=/var/run/nats/nats.pid"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: config
          mountPath: /etc/nats-config
          readOnly: true
        - name: tls
          mountPath: /etc/nats/tls
          readOnly: true
        - name: jetstream
          mountPath: /data
        - name: run
          mountPath: /var/run/nats
      - name: metrics
        image: natsio/prometheus-nats-exporter:0.20.1
        imagePullPolicy: IfNotPresent
        args: ["-p", "7777", "-varz", "-routez", "-subz", "-jsz=all", "http://127.0.0.1:8222"]
        ports:
        - name: metrics
          containerPort: 7777
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 96Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
      volumes:
      - name: config
        configMap:
          name: nats-server-config
      - name: tls
        secret:
          secretName: nats-server-tls
      - name: run
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: jetstream
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: jetstream
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
