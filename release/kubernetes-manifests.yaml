        app: frontend
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: frontend
      terminationGracePeriodSeconds: 35
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
      - name: wait-for-storefront-projection
        image: natsio/nats-box:0.19.7-nonroot
        command:
        - sh
        - -ec
        - |
          for attempt in $(seq 1 60); do
            response="$(nats --server="${NATS_URL}" --user="${NATS_USER}" --password="${NATS_PASSWORD}" --tlsca=/etc/nats-ca/ca.crt --timeout=2s request boutique.qry.storefront.home.v1 '{"currency_code":"USD"}' 2>/dev/null || true)"
            case "${response}" in
              *'"products"'*)
                echo "storefront projection contains the initial catalog and currency snapshots"
                exit 0
                ;;
            esac
            echo "waiting for initial storefront projection (${attempt}/60)"
            sleep 2
          done
          echo "storefront projection did not initialize within two minutes" >&2
          exit 1
        envFrom:
        - configMapRef:
            name: nats-client-config
        - secretRef:
            name: nats-credentials-frontend
        resources:
          requests:
            cpu: 20m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: nats-ca
          mountPath: /etc/nats-ca
          readOnly: true
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
          image: matslo123/frontend:v0.2.0@sha256:9c7731e45c499ad5b0615c1f97c1d6f2f7f74522a4723be4b276de7eac266bfa
