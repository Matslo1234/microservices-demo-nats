          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          privileged: false
          readOnlyRootFilesystem: true
        image: matslo123/paymentservice:v0.2.0@sha256:15d24f688a33485a4fd6b9b0557e14a5e6a25a66e13c07132671a3248f2e8c7c
